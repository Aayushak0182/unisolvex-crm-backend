services:
  - type: web
    name: unisolvex-crm-backend
    env: node
    rootDir: .
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
